---
name: Ansible Quality

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    name: ansible-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Create dummy vault password
        run: echo 'dummy' > ~/.vault_pass && chmod 600 ~/.vault_pass

      - name: Install Ansible collections
        run: uvx --from ansible ansible-galaxy collection install -r requirements.yml

      - name: Run ansible-lint
        run: uvx --with ansible-lint ansible-lint

  yamllint:
    name: yamllint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Run yamllint
        run: uvx yamllint .

  molecule:
    name: molecule
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Install Ansible collections
        run: uvx --from ansible ansible-galaxy collection install -r requirements.yml

      - name: Run molecule tests
        run: uvx --with molecule --with molecule-plugins[docker] --with ansible molecule test --all
        continue-on-error: true  # no molecule scenarios yet — will fail gracefully
