---
# #############################################################################
# MicroCloud — Prepare nodes (run BEFORE microcloud init)
# #############################################################################

# #############################################################################
# Phase 1 — Base setup (hostname, packages, DNS)
# #############################################################################
- name: "MC Phase 1 — Base setup"
  hosts: microcloud
  become: true
  tags: [mc_base]
  tasks:
    - name: Set hostname
      ansible.builtin.hostname:
        name: "{{ mc_hostname }}"

    - name: Update /etc/hosts
      ansible.builtin.lineinfile:
        path: /etc/hosts
        regexp: "^127\\.0\\.1\\.1"
        line: "127.0.1.1 {{ mc_hostname }}"

    - name: Disable systemd-resolved stub listener
      ansible.builtin.lineinfile:
        path: /etc/systemd/resolved.conf
        regexp: "^#?DNSStubListener="
        line: "DNSStubListener=no"
      notify: Restart resolved

    - name: Create resolved.conf.d directory
      ansible.builtin.file:
        path: /etc/systemd/resolved.conf.d
        state: directory
        mode: "0755"

    - name: Set DNS to Technitium (infra1/infra2)
      ansible.builtin.copy:
        dest: /etc/systemd/resolved.conf.d/dns.conf
        mode: "0644"
        content: |
          [Resolve]
          DNS={{ dns_primary_ip }} {{ dns_secondary_ip }}
          Domains={{ domain }}
      notify: Restart resolved

    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install base packages
      ansible.builtin.apt:
        name:
          - curl
          - wget
          - jq
          - htop
          - iotop
          - net-tools
          - rsync
          - nfs-common
        state: present

    - name: Disable cloud-init network config
      ansible.builtin.copy:
        dest: /etc/cloud/cloud.cfg.d/99-disable-network-config.cfg
        content: "network: {config: disabled}\n"
        owner: root
        group: root
        mode: "0644"

    - name: Remove cloud-init netplan (conflicts with managed config)
      ansible.builtin.file:
        path: /etc/netplan/50-cloud-init.yaml
        state: absent
      notify: Apply netplan

    - name: Deploy netplan (static IP + DNS)
      ansible.builtin.template:
        src: netplan-mc.yml.j2
        dest: /etc/netplan/01-mc.yaml
        owner: root
        group: root
        mode: "0600"
      notify: Apply netplan

  handlers:
    - name: Apply netplan
      ansible.builtin.command: netplan apply
      changed_when: true
    - name: Restart resolved
      ansible.builtin.systemd:
        name: systemd-resolved
        state: restarted

##############################################################################
# Phase 2 — Install MicroCloud snaps (sans MicroCeph)
##############################################################################
- name: "MC Phase 2 — Install snaps"
  hosts: microcloud
  become: true
  tags: [mc_snaps]
  tasks:
    - name: Install snapd
      ansible.builtin.apt:
        name: snapd
        state: present

    - name: Install MicroCloud and dependencies (no MicroCeph)
      community.general.snap:
        name:
          - lxd
          - microovn
          - microcloud
        state: present

    - name: Hold snap auto-refresh during setup
      ansible.builtin.command: snap refresh --hold
      changed_when: true

##############################################################################
# Phase 3 — NFS mount (Synology shared storage)
##############################################################################
- name: "MC Phase 3 — NFS Synology mounts"
  hosts: microcloud
  become: true
  tags: [mc_nfs]
  tasks:
    - name: Check if NFS mount points exist
      ansible.builtin.stat:
        path: "{{ item.mountpoint }}"
      register: nfs_mountpoints
      loop: "{{ nfs_mounts }}"
      loop_control:
        label: "{{ item.mountpoint }}"

    - name: Create NFS mount points (only if missing)
      ansible.builtin.file:
        path: "{{ item.item.mountpoint }}"
        state: directory
        owner: root
        group: root
        mode: "0755"
      loop: "{{ nfs_mountpoints.results }}"
      loop_control:
        label: "{{ item.item.mountpoint }}"
      when: not item.stat.exists

    - name: Mount NFS exports from Synology
      ansible.posix.mount:
        path: "{{ item.mountpoint }}"
        src: "{{ nfs_server }}:{{ item.export }}"
        fstype: nfs
        opts: rw,hard,intr,rsize=32768,wsize=32768,timeo=14,nfsvers=4.1
        state: mounted
      loop: "{{ nfs_mounts }}"
      loop_control:
        label: "{{ item.mountpoint }}"

    - name: Verify NFS mounts
      ansible.builtin.command: df -h {{ item.mountpoint }}
      register: nfs_check
      changed_when: false
      loop: "{{ nfs_mounts }}"
      loop_control:
        label: "{{ item.mountpoint }}"

    - name: Display NFS status
      ansible.builtin.debug:
        msg: "{{ item.stdout_lines }}"
      loop: "{{ nfs_check.results }}"
      loop_control:
        label: "{{ item.item.mountpoint }}"

##############################################################################
# Phase 4 — Node exporter (monitoring)
##############################################################################
- name: "MC Phase 4 — Node Exporter"
  hosts: microcloud
  become: true
  tags: [mc_monitoring]
  roles:
    - node_exporter

##############################################################################
# Summary
##############################################################################
- name: "MC — Summary"
  hosts: microcloud
  become: false
  tags: [mc_base, mc_snaps, mc_nfs, mc_monitoring]
  tasks:
    - name: Next steps
      ansible.builtin.debug:
        msg: |
          Node {{ mc_hostname }} ({{ ansible_host }}) is ready.

          NFS mounts configured:
          {% for m in nfs_mounts %}
            - {{ nfs_server }}:{{ m.export }} → {{ m.mountpoint }}
          {% endfor %}

          Next steps:
          1. Verify Synology NFS permissions for 172.16.86.13-15 (rw, no_root_squash)
          2. SSH into mc-node-01: ssh fjacquet@172.16.86.13
          3. Run: sudo microcloud init
             - Skip Ceph setup (answer "no" or skip disk selection)
             - Enable OVN networking
          4. After init, create LXD storage pools:
             lxc storage create datastore dir source=/srv/datastore
             lxc storage create isofiles dir source=/srv/isofiles
          5. Deploy monitoring: ansible-playbook -i inventory.yml microcloud-services.yml
      run_once: true # noqa: run-once[task]
