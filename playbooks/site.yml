---
# Playbook principal - Infrastructure DNS/HTTPS/VPN
# Usage:
#   ansible-playbook -i inventory.yml site.yml --ask-vault-pass
#   ansible-playbook -i inventory.yml site.yml --tags docker     # Docker uniquement
#   ansible-playbook -i inventory.yml site.yml --tags technitium  # DNS uniquement
#   ansible-playbook -i inventory.yml site.yml --tags traefik     # Traefik uniquement
#   ansible-playbook -i inventory.yml site.yml --tags wireguard   # WireGuard uniquement

# #############################################################################
# Phase 0 — Preparation commune (tous les noeuds)
# #############################################################################
- name: "Phase 0 — Preparation des noeuds infra"
  hosts: dns_servers
  become: true
  tags: [base]
  tasks:
    - name: Set hostname
      ansible.builtin.hostname:
        name: "{{ infra_hostname }}"

    - name: Update /etc/hosts
      ansible.builtin.lineinfile:
        path: /etc/hosts
        regexp: "^127\\.0\\.1\\.1"
        line: "127.0.1.1 {{ infra_hostname }}.{{ domain }} {{ infra_hostname }}"

    - name: Full system upgrade
      ansible.builtin.apt:
        update_cache: true
        upgrade: full
        autoremove: true
      register: apt_upgrade

    - name: Install base packages
      ansible.builtin.apt:
        name:
          - curl
          - gnupg
          - lsb-release
          - ca-certificates
          - rsync
          - jq
          - htop
          - net-tools
        state: present

    - name: Disable cloud-init network config
      ansible.builtin.copy:
        dest: /etc/cloud/cloud.cfg.d/99-disable-network-config.cfg
        content: "network: {config: disabled}\n"
        owner: root
        group: root
        mode: "0644"

    - name: Remove cloud-init netplan (conflicts with static config)
      ansible.builtin.file:
        path: /etc/netplan/50-cloud-init.yaml
        state: absent
      notify: Apply netplan

    - name: Remove stale manual netplan (wrong interface enp1s0)
      ansible.builtin.file:
        path: /etc/netplan/01-network.yaml
        state: absent
      notify: Apply netplan

    - name: Deploy netplan config
      ansible.builtin.template:
        src: netplan-infra.yml.j2
        dest: /etc/netplan/01-infra.yaml
        owner: root
        group: root
        mode: "0600"
      notify: Apply netplan

    - name: Load WireGuard kernel module
      community.general.modprobe:
        name: wireguard
        state: present
      when: inventory_hostname in groups['dns_secondary']

    - name: Persist WireGuard module at boot
      ansible.builtin.lineinfile:
        path: /etc/modules-load.d/wireguard.conf
        line: wireguard
        create: true
        mode: "0644"
      when: inventory_hostname in groups['dns_secondary']

  handlers:
    - name: Apply netplan
      ansible.builtin.command: netplan apply
      changed_when: true

##############################################################################
# Phase 0.3 — Docker
##############################################################################
- name: "Phase 0.3 — Install Docker"
  hosts: dns_servers
  become: true
  tags: [docker]
  tasks:
    - name: Install Docker prerequisites
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - gnupg
        state: present

    - name: Add Docker GPG key
      ansible.builtin.get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: "0644"

    - name: Add Docker APT repository
      ansible.builtin.apt_repository:
        repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present
        filename: docker

    - name: Install Docker Engine
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-compose-plugin
        state: present
        update_cache: true

    - name: Add user to docker group
      ansible.builtin.user:
        name: "{{ ansible_user }}"
        groups: docker
        append: true

    - name: Enable and start Docker
      ansible.builtin.systemd:
        name: docker
        enabled: true
        state: started

##############################################################################
# Phase 0.5 — Repertoires
##############################################################################
- name: "Phase 0.5 — Create directories"
  hosts: dns_servers
  become: true
  tags: [dirs]
  tasks:
    - name: Create Technitium directories
      ansible.builtin.file:
        path: "{{ docker_base_dir }}/technitium/config"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0755"

    - name: Create shared directories (all infra nodes)
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0755"
      loop:
        - "{{ docker_base_dir }}/ddns"

    - name: Create primary-only directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0755"
      loop:
        - "{{ docker_base_dir }}/traefik/config/dynamic"
        - "{{ docker_base_dir }}/traefik/certs"
      when: inventory_hostname in groups['dns_primary']

##############################################################################
# Phase 3 — Technitium DNS (tous les noeuds)
##############################################################################
- name: "Phase 3 — Deploy Technitium DNS"
  hosts: dns_servers
  become: true
  tags: [technitium]
  tasks:
    - name: Deploy Technitium docker-compose.yml
      ansible.builtin.template:
        src: technitium-compose.yml.j2
        dest: "{{ docker_base_dir }}/technitium/docker-compose.yml"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0640"
      notify: Restart technitium

    - name: Deploy Technitium secrets env file
      ansible.builtin.copy:
        dest: "{{ docker_base_dir }}/technitium/.env"
        content: "DNS_SERVER_ADMIN_PASSWORD={{ technitium_admin_password }}\n"
        owner: root
        group: root
        mode: "0600"
      notify: Restart technitium
      no_log: true

    - name: Start Technitium
      community.docker.docker_compose_v2:
        project_src: "{{ docker_base_dir }}/technitium"
        state: present

    - name: Flush handlers before API interaction
      ansible.builtin.meta: flush_handlers

    - name: Wait for Technitium API
      ansible.builtin.uri:
        url: "http://localhost:{{ technitium_web_port }}/api/user/login"
        method: POST
        body_format: form-urlencoded
        body:
          user: admin
          pass: "{{ technitium_admin_password }}"
        return_content: true
      register: technitium_login
      retries: 10
      delay: 5
      until: technitium_login.status == 200
      no_log: true

    - name: Extract API token
      ansible.builtin.set_fact:
        technitium_token: "{{ (technitium_login.content | from_json).token }}"
      no_log: true

  handlers:
    - name: Restart technitium
      community.docker.docker_compose_v2:
        project_src: "{{ docker_base_dir }}/technitium"
        state: restarted

##############################################################################
# Phase 3.1 — Technitium primary zone config via API
##############################################################################
- name: "Phase 3.1 — Configure Technitium PRIMARY zones & records"
  hosts: dns_primary
  become: true
  tags: [technitium, dns-config]
  tasks:
    # --- Zone forward evlab.ch ---
    - name: Create primary zone evlab.ch
      ansible.builtin.uri:
        url: "http://localhost:{{ technitium_web_port }}/api/zones/create"
        method: POST
        body_format: form-urlencoded
        body:
          token: "{{ technitium_token }}"
          zone: "{{ domain }}"
          type: Primary
      register: zone_create
      failed_when: false
      changed_when: "'was created' in (zone_create.content | default(''))"
      no_log: true

    - name: Configure zone transfer for evlab.ch
      ansible.builtin.uri:
        url: "http://localhost:{{ technitium_web_port }}/api/zones/options/set"
        method: POST
        body_format: form-urlencoded
        body:
          token: "{{ technitium_token }}"
          zone: "{{ domain }}"
          zoneTransfer: UseSpecifiedNetworkACL
          zoneTransferNetworkACL: "{{ dns_secondary_ip }}"
          notify: SpecifiedNameServers
          notifyNameServers: "{{ dns_secondary_ip }}"
      no_log: true

    # --- Zone reverse ---
    - name: Create primary reverse zone
      ansible.builtin.uri:
        url: "http://localhost:{{ technitium_web_port }}/api/zones/create"
        method: POST
        body_format: form-urlencoded
        body:
          token: "{{ technitium_token }}"
          zone: "86.16.172.in-addr.arpa"
          type: Primary
      register: rzone_create
      failed_when: false
      changed_when: "'was created' in (rzone_create.content | default(''))"
      no_log: true

    - name: Configure zone transfer for reverse zone
      ansible.builtin.uri:
        url: "http://localhost:{{ technitium_web_port }}/api/zones/options/set"
        method: POST
        body_format: form-urlencoded
        body:
          token: "{{ technitium_token }}"
          zone: "86.16.172.in-addr.arpa"
          zoneTransfer: UseSpecifiedNetworkACL
          zoneTransferNetworkACL: "{{ dns_secondary_ip }}"
          notify: SpecifiedNameServers
          notifyNameServers: "{{ dns_secondary_ip }}"
      no_log: true

    # --- A records ---
    - name: Add A records
      ansible.builtin.uri:
        url: "http://localhost:{{ technitium_web_port }}/api/zones/records/add"
        method: POST
        body_format: form-urlencoded
        body:
          token: "{{ technitium_token }}"
          zone: "{{ domain }}"
          domain: "{{ item.name }}"
          type: A
          ipAddress: "{{ item.ip }}"
          ttl: "3600"
          overwrite: "true"
      loop: "{{ dns_a_records }}"
      loop_control:
        label: "{{ item.name }} → {{ item.ip }}"
      no_log: true

    # --- PTR records ---
    - name: Add PTR records
      ansible.builtin.uri:
        url: "http://localhost:{{ technitium_web_port }}/api/zones/records/add"
        method: POST
        body_format: form-urlencoded
        body:
          token: "{{ technitium_token }}"
          zone: "86.16.172.in-addr.arpa"
          domain: "{{ item.ip.split('.')[-1] }}.86.16.172.in-addr.arpa"
          type: PTR
          ptrName: "{{ item.name }}"
          ttl: "3600"
          overwrite: "true"
      loop: "{{ dns_ptr_records }}"
      loop_control:
        label: "{{ item.ip }} → {{ item.name }}"
      no_log: true

##############################################################################
# Phase 4 — Technitium secondary zone config via API
##############################################################################
- name: "Phase 4 — Configure Technitium SECONDARY zones"
  hosts: dns_secondary
  become: true
  tags: [technitium, dns-config]
  tasks:
    - name: Create secondary zone evlab.ch
      ansible.builtin.uri:
        url: "http://localhost:{{ technitium_web_port }}/api/zones/create"
        method: POST
        body_format: form-urlencoded
        body:
          token: "{{ technitium_token }}"
          zone: "{{ domain }}"
          type: Secondary
          primaryNameServerAddresses: "{{ dns_primary_ip }}"
      register: sec_zone
      failed_when: false
      no_log: true

    - name: Create secondary reverse zone
      ansible.builtin.uri:
        url: "http://localhost:{{ technitium_web_port }}/api/zones/create"
        method: POST
        body_format: form-urlencoded
        body:
          token: "{{ technitium_token }}"
          zone: "86.16.172.in-addr.arpa"
          type: Secondary
          primaryNameServerAddresses: "{{ dns_primary_ip }}"
      register: sec_rzone
      failed_when: false
      no_log: true

##############################################################################
# Phase 5 — Blocklists (tous les noeuds)
##############################################################################
- name: "Phase 5 — Configure blocklists"
  hosts: dns_servers
  become: true
  tags: [technitium, blocklists]
  tasks:
    - name: Login to Technitium API
      ansible.builtin.uri:
        url: "http://localhost:{{ technitium_web_port }}/api/user/login"
        method: POST
        body_format: form-urlencoded
        body:
          user: admin
          pass: "{{ technitium_admin_password }}"
        return_content: true
      register: technitium_login
      retries: 10
      delay: 5
      until: technitium_login.status == 200
      no_log: true

    - name: Extract API token
      ansible.builtin.set_fact:
        technitium_token: "{{ (technitium_login.content | from_json).token }}"
      no_log: true

    - name: Enable blocking and set blocklist URLs
      ansible.builtin.uri:
        url: "http://localhost:{{ technitium_web_port }}/api/settings/set"
        method: POST
        body_format: form-urlencoded
        body:
          token: "{{ technitium_token }}"
          enableBlocking: "true"
          blockListUrls: "{{ technitium_blocklists | join(',') }}"
          blockListUpdateIntervalHours: "24"
      register: blocking_result
      failed_when: false
      no_log: true

    - name: Force update blocklists
      ansible.builtin.uri:
        url: "http://localhost:{{ technitium_web_port }}/api/settings/forceUpdateBlockLists"
        method: POST
        body_format: form-urlencoded
        body:
          token: "{{ technitium_token }}"
      register: blocklist_update
      failed_when: false
      no_log: true

    - name: Wait for blocklists to download
      ansible.builtin.pause:
        seconds: 15

##############################################################################
# Phase 6 — Traefik (les 2 noeuds pour HA)
##############################################################################
- name: "Phase 6 — Deploy Traefik"
  hosts: dns_servers
  become: true
  tags: [traefik]
  tasks:
    - name: Create Traefik directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0755"
      loop:
        - "{{ docker_base_dir }}/traefik/config/dynamic"
        - "{{ docker_base_dir }}/traefik/certs"

    - name: Deploy Traefik docker-compose.yml
      ansible.builtin.template:
        src: traefik-compose.yml.j2
        dest: "{{ docker_base_dir }}/traefik/docker-compose.yml"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0640"

    - name: Deploy Traefik secrets env file
      ansible.builtin.copy:
        dest: "{{ docker_base_dir }}/traefik/.env"
        content: "INFOMANIAK_ACCESS_TOKEN={{ infomaniak_api_token }}\n"
        owner: root
        group: root
        mode: "0600"
      notify: Restart traefik
      no_log: true

    - name: Pre-create acme.json with correct permissions
      ansible.builtin.file:
        path: "{{ docker_base_dir }}/traefik/certs/acme.json"
        state: touch
        owner: root
        group: root
        mode: "0600"
        modification_time: preserve
        access_time: preserve

    - name: Deploy Traefik static config
      ansible.builtin.template:
        src: traefik-static.yml.j2
        dest: "{{ docker_base_dir }}/traefik/config/traefik.yml"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0644"
      notify: Restart traefik

    - name: Deploy Traefik dynamic services
      ansible.builtin.template:
        src: traefik-services.yml.j2
        dest: "{{ docker_base_dir }}/traefik/config/dynamic/services.yml"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0644"

    - name: Start Traefik
      community.docker.docker_compose_v2:
        project_src: "{{ docker_base_dir }}/traefik"
        state: present

  handlers:
    - name: Restart traefik
      community.docker.docker_compose_v2:
        project_src: "{{ docker_base_dir }}/traefik"
        state: restarted

##############################################################################
# Phase 6.05 — Keepalived (Traefik HA avec VIP flottante)
##############################################################################
- name: "Phase 6.05 — Deploy keepalived for Traefik HA"
  hosts: dns_servers
  become: true
  tags: [traefik, keepalived]
  tasks:
    - name: Install keepalived
      ansible.builtin.apt:
        name: keepalived
        state: present

    - name: Create keepalived scripts directory
      ansible.builtin.file:
        path: /etc/keepalived/scripts
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Deploy Traefik health check script
      ansible.builtin.template:
        src: check-traefik.sh.j2
        dest: /etc/keepalived/scripts/check_traefik.sh
        owner: root
        group: root
        mode: "0755"

    - name: Deploy keepalived config
      ansible.builtin.template:
        src: keepalived.conf.j2
        dest: /etc/keepalived/keepalived.conf
        owner: root
        group: root
        mode: "0644"
      notify: Restart keepalived
      no_log: true

    - name: Enable and start keepalived
      ansible.builtin.systemd:
        name: keepalived
        enabled: true
        state: started

    - name: Deploy ACME sync script (primary only)
      ansible.builtin.template:
        src: sync-acme.sh.j2
        dest: "{{ docker_base_dir }}/traefik/sync-acme.sh"
        owner: root
        group: root
        mode: "0700"
      when: inventory_hostname in groups['dns_primary']

    - name: ACME sync cron every 5 minutes (primary only)
      ansible.builtin.cron:
        name: "Sync acme.json to infra2"
        minute: "*/5"
        job: "{{ docker_base_dir }}/traefik/sync-acme.sh"
      when: inventory_hostname in groups['dns_primary']

  handlers:
    - name: Restart keepalived
      ansible.builtin.systemd:
        name: keepalived
        state: restarted

##############################################################################
# Phase 6.1 — Verrouiller port 5380 (HTTPS only via Traefik)
##############################################################################
- name: "Phase 6.1 — Restrict Technitium Web UI to localhost"
  hosts: dns_servers
  become: true
  tags: [traefik, firewall]
  tasks:
    - name: Install iptables-persistent
      ansible.builtin.apt:
        name: iptables-persistent
        state: present

    - name: Deploy iptables rules from template
      ansible.builtin.template:
        src: iptables-rules.v4.j2
        dest: /etc/iptables/rules.v4
        owner: root
        group: root
        mode: "0644"

    - name: Apply iptables rules from file
      ansible.builtin.command: netfilter-persistent reload
      changed_when: false

##############################################################################
# Phase 8 — DHCP scopes via API (primary + secondary)
##############################################################################
- name: "Phase 8 — Configure DHCP scopes"
  hosts: dns_servers
  become: true
  tags: [technitium, dhcp]
  tasks:
    - name: Login to Technitium API
      ansible.builtin.uri:
        url: "http://localhost:{{ technitium_web_port }}/api/user/login"
        method: POST
        body_format: form-urlencoded
        body:
          user: admin
          pass: "{{ technitium_admin_password }}"
        return_content: true
      register: technitium_login
      retries: 10
      delay: 5
      until: technitium_login.status == 200
      no_log: true

    - name: Extract API token
      ansible.builtin.set_fact:
        technitium_token: "{{ (technitium_login.content | from_json).token }}"
      no_log: true

    - name: Configure DHCP dynamic scope
      ansible.builtin.uri:
        url: "http://localhost:{{ technitium_web_port }}/api/dhcp/scopes/set"
        method: POST
        body_format: form-urlencoded
        body:
          token: "{{ technitium_token }}"
          name: "lan-{{ inventory_hostname }}"
          startingAddress: "{{ dhcp_range_start }}"
          endingAddress: "{{ dhcp_range_end }}"
          subnetMask: "255.255.255.0"
          routerAddress: "{{ gateway }}"
          dnsServers: "{{ dns_primary_ip }},{{ dns_secondary_ip }},1.1.1.1"
          domainName: "{{ domain }}"
          leaseTimeDays: "1"
          dnsSuffix: "{{ domain }}"
      register: dhcp_result
      failed_when: false
      no_log: true

    # Static scope: covers .2-.99 with full exclusion — no dynamic offers,
    # only serves reserved leases. Both servers hold it for HA.
    - name: Configure DHCP static-reservation scope (.2-.99)
      ansible.builtin.uri:
        url: "http://localhost:{{ technitium_web_port }}/api/dhcp/scopes/set"
        method: POST
        body_format: form-urlencoded
        body:
          token: "{{ technitium_token }}"
          name: "static-lan"
          startingAddress: "172.16.86.2"
          endingAddress: "172.16.86.99"
          subnetMask: "255.255.255.0"
          routerAddress: "{{ gateway }}"
          dnsServers: "{{ dns_primary_ip }},{{ dns_secondary_ip }}"
          domainName: "{{ domain }}"
          leaseTimeDays: "7"
          dnsSuffix: "{{ domain }}"
          exclusions: "[{\"startingAddress\":\"172.16.86.2\",\"endingAddress\":\"172.16.86.99\"}]"
      failed_when: false
      no_log: true

    - name: Enable DHCP static-reservation scope
      ansible.builtin.uri:
        url: "http://localhost:{{ technitium_web_port }}/api/dhcp/scopes/enable"
        method: POST
        body_format: form-urlencoded
        body:
          token: "{{ technitium_token }}"
          name: "static-lan"
      failed_when: false
      no_log: true

    - name: Enable DHCP scope
      ansible.builtin.uri:
        url: "http://localhost:{{ technitium_web_port }}/api/dhcp/scopes/enable"
        method: POST
        body_format: form-urlencoded
        body:
          token: "{{ technitium_token }}"
          name: "lan-{{ inventory_hostname }}"
      failed_when: false
      no_log: true

    - name: Add DHCP reservations (within scope range only)
      ansible.builtin.uri:
        url: "http://localhost:{{ technitium_web_port }}/api/dhcp/scopes/addReservedLease"
        method: POST
        body_format: form-urlencoded
        body:
          token: "{{ technitium_token }}"
          name: "lan-{{ inventory_hostname }}"
          hardwareAddress: "{{ item.mac }}"
          ipAddress: "{{ item.ip }}"
          hostName: "{{ item.name | regex_replace(' ', '-') | lower }}"
      loop: "{{ dhcp_reservations }}"
      loop_control:
        label: "{{ item.name }} ({{ item.ip }})"
      when: >-
        (item.ip.split('.')[-1] | int) >= (dhcp_range_start.split('.')[-1] | int) and
        (item.ip.split('.')[-1] | int) <= (dhcp_range_end.split('.')[-1] | int)
      failed_when: false
      no_log: true

    - name: Add DHCP reservations to static-lan scope (.2-.99)
      ansible.builtin.uri:
        url: "http://localhost:{{ technitium_web_port }}/api/dhcp/scopes/addReservedLease"
        method: POST
        body_format: form-urlencoded
        body:
          token: "{{ technitium_token }}"
          name: "static-lan"
          hardwareAddress: "{{ item.mac }}"
          ipAddress: "{{ item.ip }}"
          hostName: "{{ item.name | regex_replace(' ', '-') | lower }}"
      loop: "{{ dhcp_reservations }}"
      loop_control:
        label: "{{ item.name }} ({{ item.ip }})"
      when: (item.ip.split('.')[-1] | int) <= 99
      failed_when: false
      no_log: true

##############################################################################
# Phase 9 — WireGuard natif (infra2 only)
##############################################################################
- name: "Phase 9 — Deploy WireGuard (native, on infra2)"
  hosts: dns_secondary
  become: true
  tags: [wireguard]
  tasks:
    - name: Install WireGuard + QR tools
      ansible.builtin.apt:
        name:
          - wireguard
          - wireguard-tools
          - qrencode
        state: present

    - name: Enable IP forwarding
      ansible.posix.sysctl:
        name: net.ipv4.ip_forward
        value: "1"
        sysctl_file: /etc/sysctl.d/99-wireguard.conf
        reload: true

    - name: Deploy wg0.conf
      ansible.builtin.template:
        src: wg0.conf.j2
        dest: /etc/wireguard/wg0.conf
        owner: root
        group: root
        mode: "0600"
      notify: Restart wireguard
      no_log: true

    - name: Enable and start WireGuard
      ansible.builtin.systemd:
        name: wg-quick@wg0
        enabled: true
        state: started

    - name: Create client configs directory
      ansible.builtin.file:
        path: /etc/wireguard/clients
        state: directory
        owner: root
        group: root
        mode: "0700"

    - name: Generate client configs
      ansible.builtin.template:
        src: wg-client.conf.j2
        dest: "/etc/wireguard/clients/{{ peer.name }}.conf"
        owner: root
        group: root
        mode: "0600"
      loop: "{{ wireguard_peers_list }}"
      loop_control:
        loop_var: peer
        label: "{{ peer.name }}"
      no_log: true

    - name: Generate QR codes for mobile clients
      ansible.builtin.shell: |
        qrencode -t png -o /etc/wireguard/clients/{{ peer.name }}.png < /etc/wireguard/clients/{{ peer.name }}.conf
      args:
        creates: "/etc/wireguard/clients/{{ peer.name }}.png"
      loop: "{{ wireguard_peers_list }}"
      loop_control:
        loop_var: peer
        label: "{{ peer.name }}"
      no_log: true

    - name: Display client config paths
      ansible.builtin.debug:
        msg: >
          Client {{ peer.name }}:
          config = /etc/wireguard/clients/{{ peer.name }}.conf
          qr     = /etc/wireguard/clients/{{ peer.name }}.png
          Recuperer avec: scp infra2:/etc/wireguard/clients/{{ peer.name }}.* .
      loop: "{{ wireguard_peers_list }}"
      loop_control:
        loop_var: peer
        label: "{{ peer.name }}"

    - name: Allow WireGuard port in UFW (if active)
      community.general.ufw:
        rule: allow
        port: "{{ wireguard_port }}"
        proto: udp
        comment: WireGuard VPN
      failed_when: false

  handlers:
    - name: Restart wireguard
      ansible.builtin.systemd:
        name: wg-quick@wg0
        state: restarted

##############################################################################
# Phase 2 + 11 — DDNS + Backups (cron)
##############################################################################
- name: "Phase 2+11 — DDNS & Backup crons"
  hosts: dns_servers
  become: true
  tags: [cron]
  tasks:
    - name: Deploy DDNS script (primary only)
      ansible.builtin.template:
        src: update-ddns.sh.j2
        dest: "{{ docker_base_dir }}/ddns/update-ddns.sh"
        owner: root
        group: root
        mode: "0700"
      when: inventory_hostname in groups['dns_primary']

    - name: DDNS cron every 5 min (primary only)
      ansible.builtin.cron:
        name: "DDNS update vpn.evlab.ch"
        minute: "*/5"
        job: "{{ docker_base_dir }}/ddns/update-ddns.sh >> /var/log/ddns.log 2>&1"
      when: inventory_hostname in groups['dns_primary']

    - name: Deploy backup script
      ansible.builtin.template:
        src: backup-infra.sh.j2
        dest: "{{ docker_base_dir }}/ddns/backup-infra.sh"
        owner: root
        group: root
        mode: "0755"

    - name: Backup cron nightly at 02:00
      ansible.builtin.cron:
        name: "Nightly infra backup"
        hour: "2"
        minute: "0"
        job: "{{ docker_base_dir }}/ddns/backup-infra.sh >> /var/log/backup.log 2>&1"

##############################################################################
# Phase 10 — Monitoring exporters (Prometheus-ready)
##############################################################################
- name: "Phase 10 — Node Exporter (all nodes)"
  hosts: dns_servers
  become: true
  tags: [monitoring, node_exporter]
  roles:
    - node_exporter

- name: "Phase 10 — cAdvisor (Docker metrics)"
  hosts: dns_servers
  become: true
  tags: [monitoring, cadvisor]
  tasks:
    - name: Deploy cAdvisor container
      community.docker.docker_container:
        name: cadvisor
        image: gcr.io/cadvisor/cadvisor:latest
        state: started
        restart_policy: unless-stopped
        published_ports:
          - "{{ cadvisor_port }}:8080"
        volumes:
          - /:/rootfs:ro
          - /var/run:/var/run:ro
          - /sys:/sys:ro
          - /var/lib/docker/:/var/lib/docker:ro
          - /dev/disk/:/dev/disk:ro
        devices:
          - /dev/kmsg
        privileged: true

- name: "Phase 10 — WireGuard Exporter (infra2 only)"
  hosts: dns_secondary
  become: true
  tags: [monitoring, wireguard_exporter]
  tasks:
    - name: Deploy prometheus_wireguard_exporter container
      community.docker.docker_container:
        name: wireguard-exporter
        image: mindflavor/prometheus-wireguard-exporter:latest
        state: started
        restart_policy: unless-stopped
        network_mode: host
        capabilities:
          - NET_ADMIN
        volumes:
          - /etc/wireguard:/etc/wireguard:ro
        entrypoint:
          - /usr/local/bin/prometheus_wireguard_exporter
        command:
          - "-a"
          - "false"
        env:
          PROMETHEUS_WIREGUARD_EXPORTER_PORT: "{{ wireguard_exporter_port | string }}"

##############################################################################
# Phase 10.5 — NTP and false-alarm suppression (dns_servers)
##############################################################################
- name: "Phase 10.5 — NTP and service fixes"
  hosts: dns_servers
  become: true
  tags: [fixes]
  tasks:
    - name: Create timesyncd drop-in directory
      ansible.builtin.file:
        path: /etc/systemd/timesyncd.conf.d
        state: directory
        mode: "0755"

    - name: Configure NTP servers for systemd-timesyncd
      ansible.builtin.copy:
        dest: /etc/systemd/timesyncd.conf.d/homelab.conf
        mode: "0644"
        content: |
          [Time]
          NTP=ntp.metas.ch
          FallbackNTP=pool.ntp.org
      notify: Restart timesyncd

    - name: Mask openipmi service (no IPMI hardware on Optiplex Micro — false alarm)
      ansible.builtin.systemd:
        name: openipmi
        masked: true
        daemon_reload: true
      failed_when: false

  handlers:
    - name: Restart timesyncd
      ansible.builtin.systemd:
        name: systemd-timesyncd
        state: restarted

##############################################################################
# Verification
##############################################################################
- name: "Verification — Smoke tests"
  hosts: dns_primary
  become: false
  tags: [verify]
  tasks:
    - name: Test DNS resolution (primary)
      ansible.builtin.command: "dig @{{ dns_primary_ip }} {{ item }} +short"
      loop:
        - "homeassistant.{{ domain }}"
        - "nas.{{ domain }}"
        - "infra1.{{ domain }}"
      register: dig_results
      changed_when: false

    - name: Display DNS results
      ansible.builtin.debug:
        msg: "{{ item.item }} → {{ item.stdout }}"
      loop: "{{ dig_results.results }}"
      loop_control:
        label: "{{ item.item }}"

    - name: Test DNS resolution (secondary)
      ansible.builtin.command: "dig @{{ dns_secondary_ip }} homeassistant.{{ domain }} +short"
      register: dig_secondary
      changed_when: false

    - name: Display secondary result
      ansible.builtin.debug:
        msg: "secondary homeassistant.{{ domain }} → {{ dig_secondary.stdout }}"

    - name: Test reverse DNS
      ansible.builtin.command: "dig @{{ dns_primary_ip }} -x {{ nas_ip }} +short"
      register: dig_ptr
      changed_when: false

    - name: Display PTR result
      ansible.builtin.debug:
        msg: "{{ nas_ip }} → {{ dig_ptr.stdout }}"

    - name: Test ad blocking
      ansible.builtin.command: "dig @{{ dns_primary_ip }} doubleclick.net +short"
      register: dig_block
      changed_when: false

    - name: Display blocking result
      ansible.builtin.debug:
        msg: "doubleclick.net → {{ dig_block.stdout }} (should be 0.0.0.0)"
