---
# #############################################################################
# MicroCloud — Deploy services as LXD VMs (run AFTER microcloud init)
# VMs get real LAN IPs via macvlan on enp0s31f6 — no proxy devices needed.
# Services installed natively via apt (no Docker). VM disks on NFS datastore.
# #############################################################################

# #############################################################################
# Phase 0a — Clean up old LXD containers
# #############################################################################
# - name: "MC Services — Clean up old containers"
#   hosts: microcloud[0]
#   become: true
#   tags: [mc_cleanup]
#   tasks:
#     - name: Delete existing LXD instances (containers and VMs, if any)
#       ansible.builtin.command: "lxc delete {{ item }} --force"
#       loop:
#         - monitoring
#         - checkmk
#         - automation
#         - vm-monitoring
#         - vm-checkmk
#         - vm-automation
#       failed_when: false
#       changed_when: true

# #############################################################################
# Phase 0b — Storage pool (dir on NFS)
# VMs use qcow2 images so no xattr/btrfs needed — dir driver on NFS works.
# Synology NFS must have "No mapping" (no_root_squash) for LXD root access.
# #############################################################################
- name: "MC Services — Configure LXD storage pool (dir on NFS)"
  hosts: microcloud[0]
  become: true
  tags: [mc_lxd_storage, mc_lxd_ui]
  tasks:
    - name: Create per-node VM storage directories on NFS
      ansible.builtin.file:
        path: "/srv/datastore/lxd-vms/{{ hostvars[item]['mc_hostname'] }}"
        state: directory
        mode: "0711"
      loop: "{{ groups['microcloud'] }}"
      loop_control:
        label: "{{ hostvars[item]['mc_hostname'] }}"

    - name: Check if datastore pool exists
      ansible.builtin.command: lxc storage show datastore
      register: storage_check
      failed_when: false
      changed_when: false

    - name: Create clustered dir storage pool on NFS
      when: storage_check.rc != 0
      block:
        - name: Create storage pool on each cluster member
          ansible.builtin.command: >-
            lxc storage create datastore dir
            --target {{ hostvars[item]['mc_hostname'] }}
            source=/srv/datastore/lxd-vms/{{ hostvars[item]['mc_hostname'] }}
          loop: "{{ groups['microcloud'] }}"
          loop_control:
            label: "{{ hostvars[item]['mc_hostname'] }}"
          changed_when: true

        - name: Finalize storage pool
          ansible.builtin.command: lxc storage create datastore dir
          changed_when: true

    - name: Ensure default profile has root disk
      ansible.builtin.command: lxc profile device add default root disk path=/ pool=datastore
      register: profile_root
      failed_when: false
      changed_when: "'Device root added' in profile_root.stdout"

# #############################################################################
# Phase 0c — Create macvlan profile for VMs (real LAN IPs)
# VMs get IPs on 172.16.86.0/24 via macvlan on enp0s31f6
# #############################################################################
- name: "MC Services — Create macvlan network profile"
  hosts: microcloud[0]
  become: true
  tags: [mc_lxd_storage, mc_lxd_ui, mc_network]
  tasks:
    - name: Check if bridged-lan profile exists
      ansible.builtin.command: lxc profile show bridged-lan
      register: profile_check
      failed_when: false
      changed_when: false

    - name: Create bridged-lan profile
      when: profile_check.rc != 0
      block:
        - name: Create empty profile
          ansible.builtin.command: lxc profile create bridged-lan
          changed_when: true

        - name: Configure macvlan NIC on physical interface
          ansible.builtin.command: >-
            lxc profile device add bridged-lan eth0 nic
            nictype=macvlan
            parent={{ lan_interface }}
          changed_when: true

# #############################################################################
# Phase 0d — LXD Web UI
# #############################################################################
- name: "MC Services — Enable LXD Web UI"
  hosts: microcloud[0]
  become: true
  tags: [mc_lxd_ui]
  tasks:
    - name: Expose LXD API on network for Web UI
      ansible.builtin.command: lxc config set core.https_address {{ ansible_host }}:8443
      changed_when: true

    - name: Generate LXD trust token for UI access
      ansible.builtin.command: lxc config trust add --name ui-admin
      register: lxd_trust_token
      changed_when: true

    - name: Display LXD UI access info
      ansible.builtin.debug:
        msg: |
          LXD Web UI available at: https://lxd.evlab.ch
          Trust token (use in browser): {{ lxd_trust_token.stdout }}

# #############################################################################
# Phase 1 — Monitoring VM (Prometheus + Grafana) — 172.16.86.21
# #############################################################################
- name: "MC Services — Monitoring VM (Prometheus + Grafana)"
  hosts: microcloud[0]
  become: true
  tags: [mc_prometheus, mc_grafana, mc_monitoring]
  vars:
    vm_name: vm-monitoring
    vm_ip: 172.16.86.21
    vm_target: mc-node-01
  tasks:
    - name: Check if VM exists
      ansible.builtin.command: "lxc info {{ vm_name }}"
      register: vm_exists
      failed_when: false
      changed_when: false

    - name: Create monitoring VM on {{ vm_target }}
      when: vm_exists.rc != 0
      block:
        - name: Launch VM directly on target node
          ansible.builtin.command: >-
            lxc launch ubuntu:24.04 {{ vm_name }}
            --vm
            --target {{ vm_target }}
            --profile default
            --profile bridged-lan
            -c limits.cpu=2
            -c limits.memory=4GB
          changed_when: true

        - name: Wait for VM agent to be ready
          ansible.builtin.command: "lxc exec {{ vm_name }} -- true"
          retries: 30
          delay: 10
          register: vm_agent
          until: vm_agent.rc == 0
          changed_when: false

        - name: Remove cloud-init default netplan (disables DHCP)
          ansible.builtin.command: "lxc exec {{ vm_name }} -- rm -f /etc/netplan/50-cloud-init.yaml"
          changed_when: true

        - name: Configure static IP via netplan
          ansible.builtin.shell: |
            set -o pipefail
            cat <<'NETPLAN' | lxc exec {{ vm_name }} -- tee /etc/netplan/50-static.yaml
            network:
              version: 2
              ethernets:
                enp5s0:
                  dhcp4: false
                  addresses:
                    - {{ vm_ip }}/24
                  routes:
                    - to: default
                      via: {{ gateway }}
                  nameservers:
                    addresses:
                      - {{ dns_primary_ip }}
                      - {{ dns_secondary_ip }}
            NETPLAN
          args:
            executable: /bin/bash
          changed_when: true

        - name: Apply netplan
          ansible.builtin.command: "lxc exec {{ vm_name }} -- netplan apply"
          changed_when: true

    - name: Wait for cloud-init to finish
      ansible.builtin.command: "lxc exec {{ vm_name }} -- cloud-init status --wait"
      changed_when: false
      timeout: 300

    - name: Install base packages
      ansible.builtin.command: >-
        lxc exec {{ vm_name }} --
        bash -c "apt-get update && DEBIAN_FRONTEND=noninteractive apt-get install -y
        python3 gpg apt-transport-https software-properties-common curl prometheus"
      changed_when: true

    # --- Prometheus config ---
    - name: Deploy Prometheus config
      ansible.builtin.shell: |
        set -o pipefail
        cat <<'PROM_EOF' | lxc exec {{ vm_name }} -- tee /etc/prometheus/prometheus.yml
        global:
          scrape_interval: 15s
          evaluation_interval: 15s

        scrape_configs:
          # --- Infrastructure nodes (infra1, infra2) ---
          - job_name: node-infra
            static_configs:
              - targets:
                  - {{ dns_primary_ip }}:{{ node_exporter_port }}
                  - {{ dns_secondary_ip }}:{{ node_exporter_port }}
                labels:
                  role: infra

          # --- MicroCloud nodes (mc-node-01/.13 excluded: macvlan host-to-VM unreachable) ---
          - job_name: node-microcloud
            static_configs:
              - targets:
                  - {{ hostvars[groups['microcloud'][1]]['ansible_host'] }}:{{ node_exporter_port }}
                  - {{ hostvars[groups['microcloud'][2]]['ansible_host'] }}:{{ node_exporter_port }}
                labels:
                  role: microcloud

          # --- Docker containers (cAdvisor) ---
          - job_name: cadvisor
            static_configs:
              - targets:
                  - {{ dns_primary_ip }}:{{ cadvisor_port }}
                  - {{ dns_secondary_ip }}:{{ cadvisor_port }}

          # --- Traefik (HTTP API port 8080, iptables allows vm-monitoring) ---
          - job_name: traefik
            static_configs:
              - targets:
                  - {{ dns_primary_ip }}:8080
                  - {{ dns_secondary_ip }}:8080

          # --- WireGuard (infra2) ---
          - job_name: wireguard
            static_configs:
              - targets:
                  - {{ dns_secondary_ip }}:{{ wireguard_exporter_port }}

          # --- Prometheus self ---
          - job_name: prometheus
            static_configs:
              - targets:
                  - localhost:9090
        PROM_EOF
      args:
        executable: /bin/bash
      changed_when: true

    - name: Configure Prometheus retention
      ansible.builtin.command: >-
        lxc exec {{ vm_name }} --
        bash -c "sed -i 's/^ARGS=.*/ARGS=\"--storage.tsdb.retention.time=30d --web.enable-lifecycle\"/' /etc/default/prometheus"
      changed_when: true

    - name: Enable and start Prometheus
      ansible.builtin.command: "lxc exec {{ vm_name }} -- systemctl enable --now prometheus"
      changed_when: true

    # --- Grafana ---
    - name: Install Grafana APT key and repo
      ansible.builtin.command: >-
        lxc exec {{ vm_name }} --
        bash -c "curl -fsSL https://apt.grafana.com/gpg.key | gpg --dearmor --yes -o /usr/share/keyrings/grafana-archive-keyring.gpg
        && echo 'deb [signed-by=/usr/share/keyrings/grafana-archive-keyring.gpg] https://apt.grafana.com stable main' > /etc/apt/sources.list.d/grafana.list"
      changed_when: true

    - name: Install Grafana
      ansible.builtin.command: >-
        lxc exec {{ vm_name }} --
        bash -c "apt-get update && DEBIAN_FRONTEND=noninteractive apt-get install -y grafana"
      changed_when: true

    - name: Configure Grafana settings
      ansible.builtin.shell: |
        set -o pipefail
        lxc exec {{ vm_name }} -- bash -c "
          sed -i 's/^;admin_user =.*/admin_user = admin/' /etc/grafana/grafana.ini
          sed -i 's/^;admin_password =.*/admin_password = {{ vault_grafana_password }}/' /etc/grafana/grafana.ini
          sed -i 's/^;allow_sign_up =.*/allow_sign_up = false/' /etc/grafana/grafana.ini
          sed -i 's|^;root_url =.*|root_url = https://grafana.{{ domain }}|' /etc/grafana/grafana.ini
        "
      args:
        executable: /bin/bash
      changed_when: true
      no_log: true

    - name: Deploy Grafana datasource provisioning
      ansible.builtin.shell: |
        set -o pipefail
        cat <<'GRAF_DS' | lxc exec {{ vm_name }} -- tee /etc/grafana/provisioning/datasources/prometheus.yml
        apiVersion: 1
        datasources:
          - name: Prometheus
            type: prometheus
            access: proxy
            url: http://localhost:9090
            isDefault: true
            editable: false
        GRAF_DS
      args:
        executable: /bin/bash
      changed_when: true

    - name: Install Checkmk datasource plugin for Grafana
      ansible.builtin.command: >-
        lxc exec {{ vm_name }} -- grafana-cli plugins install checkmk-cloud-datasource
      changed_when: true

    - name: Deploy Checkmk datasource provisioning
      ansible.builtin.shell: |
        set -o pipefail
        cat <<'GRAF_CMK' | lxc exec {{ vm_name }} -- tee /etc/grafana/provisioning/datasources/checkmk.yml
        apiVersion: 1
        datasources:
          - name: Checkmk
            type: checkmk-cloud-datasource
            access: proxy
            jsonData:
              url: http://172.16.86.22/cmk/
              edition: RAW
              username: grafana
            secureJsonData:
              secret: {{ vault_checkmk_grafana_secret }}
            editable: false
        GRAF_CMK
      args:
        executable: /bin/bash
      changed_when: true
      no_log: true

    - name: Deploy Grafana dashboard provisioning
      ansible.builtin.shell: |
        set -o pipefail
        cat <<'GRAF_DASH' | lxc exec {{ vm_name }} -- tee /etc/grafana/provisioning/dashboards/default.yml
        apiVersion: 1
        providers:
          - name: default
            orgId: 1
            folder: ''
            type: file
            disableDeletion: false
            updateIntervalSeconds: 30
            options:
              path: /var/lib/grafana/dashboards
              foldersFromFilesStructure: false
        GRAF_DASH
      args:
        executable: /bin/bash
      changed_when: true

    - name: Enable and start Grafana
      ansible.builtin.command: "lxc exec {{ vm_name }} -- systemctl enable --now grafana-server"
      changed_when: true

    - name: Capture VM MAC address for DHCP reservation
      ansible.builtin.command: "lxc config get {{ vm_name }} volatile.eth0.hwaddr"
      register: vm_monitoring_mac
      changed_when: false

    - name: Display access info
      ansible.builtin.debug:
        msg: |
          Monitoring VM '{{ vm_name }}' deployed on {{ mc_hostname }}.
          VM IP:      {{ vm_ip }}
          VM MAC:     {{ vm_monitoring_mac.stdout }}

          Prometheus: http://{{ vm_ip }}:9090
          Grafana:    http://{{ vm_ip }}:3000 (admin / <see vault>)

          Recommended Grafana dashboards to import:
            - Node Exporter Full: ID 1860
            - Docker / cAdvisor:  ID 193
            - Traefik:            ID 17346

          Add DHCP reservation with MAC: {{ vm_monitoring_mac.stdout }}

# #############################################################################
# Phase 2 — Checkmk VM — 172.16.86.22
# #############################################################################
- name: "MC Services — Checkmk VM"
  hosts: microcloud[0]
  become: true
  tags: [mc_checkmk]
  vars:
    vm_name: vm-checkmk
    vm_ip: 172.16.86.22
    vm_target: mc-node-02
  tasks:
    - name: Check if VM exists
      ansible.builtin.command: "lxc info {{ vm_name }}"
      register: vm_exists
      failed_when: false
      changed_when: false

    - name: Create Checkmk VM on {{ vm_target }}
      when: vm_exists.rc != 0
      block:
        - name: Launch VM directly on target node
          ansible.builtin.command: >-
            lxc launch ubuntu:24.04 {{ vm_name }}
            --vm
            --target {{ vm_target }}
            --profile default
            --profile bridged-lan
            -c limits.cpu=2
            -c limits.memory=4GB
          changed_when: true

        - name: Wait for VM agent to be ready
          ansible.builtin.command: "lxc exec {{ vm_name }} -- true"
          retries: 30
          delay: 10
          register: vm_agent
          until: vm_agent.rc == 0
          changed_when: false

        - name: Remove cloud-init default netplan (disables DHCP)
          ansible.builtin.command: "lxc exec {{ vm_name }} -- rm -f /etc/netplan/50-cloud-init.yaml"
          changed_when: true

        - name: Configure static IP via netplan
          ansible.builtin.shell: |
            set -o pipefail
            cat <<'NETPLAN' | lxc exec {{ vm_name }} -- tee /etc/netplan/50-static.yaml
            network:
              version: 2
              ethernets:
                enp5s0:
                  dhcp4: false
                  addresses:
                    - {{ vm_ip }}/24
                  routes:
                    - to: default
                      via: {{ gateway }}
                  nameservers:
                    addresses:
                      - {{ dns_primary_ip }}
                      - {{ dns_secondary_ip }}
            NETPLAN
          args:
            executable: /bin/bash
          changed_when: true

        - name: Apply netplan
          ansible.builtin.command: "lxc exec {{ vm_name }} -- netplan apply"
          changed_when: true

    - name: Wait for cloud-init to finish
      ansible.builtin.command: "lxc exec {{ vm_name }} -- cloud-init status --wait"
      changed_when: false
      timeout: 300

    - name: Install prerequisites
      ansible.builtin.command: >-
        lxc exec {{ vm_name }} --
        bash -c "apt-get update && DEBIAN_FRONTEND=noninteractive apt-get install -y python3 wget"
      changed_when: true

    - name: Download Checkmk Raw Edition
      ansible.builtin.command: >-
        lxc exec {{ vm_name }} --
        bash -c "test -f /tmp/checkmk.deb ||
        wget -q 'https://download.checkmk.com/checkmk/2.3.0p30/check-mk-raw-2.3.0p30_0.noble_amd64.deb' -O /tmp/checkmk.deb"
      changed_when: true

    - name: Install Checkmk package
      ansible.builtin.command: >-
        lxc exec {{ vm_name }} --
        bash -c "DEBIAN_FRONTEND=noninteractive
        apt-get install -y /tmp/checkmk.deb || (apt-get install -f -y && apt-get install -y /tmp/checkmk.deb)"
      changed_when: true

    - name: Create Checkmk site
      ansible.builtin.shell: |
        set -o pipefail
        lxc exec {{ vm_name }} -- bash -c '
          if ! omd sites | grep -q cmk; then
            omd create cmk
            htpasswd -b /omd/sites/cmk/etc/htpasswd cmkadmin "{{ vault_checkmk_password }}"
            omd start cmk
          else
            omd start cmk || true
          fi
        '
      args:
        executable: /bin/bash
      changed_when: true
      no_log: true

    - name: Disable login lock during initial setup
      ansible.builtin.shell: |
        set -o pipefail
        lxc exec {{ vm_name }} -- bash -c '
          WATO_DIR=/omd/sites/cmk/etc/check_mk/multisite.d/wato
          mkdir -p "$WATO_DIR"
          if ! grep -q lock_on_logon_failures "$WATO_DIR/global.mk" 2>/dev/null; then
            echo "lock_on_logon_failures = 0" >> "$WATO_DIR/global.mk"
            chown cmk:cmk "$WATO_DIR/global.mk"
          fi
          echo 0 > /omd/sites/cmk/var/check_mk/web/cmkadmin/num_failed_logins.mk
          chown cmk:cmk /omd/sites/cmk/var/check_mk/web/cmkadmin/num_failed_logins.mk
        '
      args:
        executable: /bin/bash
      changed_when: true

    - name: Capture VM MAC address for DHCP reservation
      ansible.builtin.command: "lxc config get {{ vm_name }} volatile.eth0.hwaddr"
      register: vm_checkmk_mac
      changed_when: false

    - name: Wait for Checkmk to be ready
      ansible.builtin.uri:
        url: "http://{{ vm_ip }}/cmk/check_mk/login.py"
        status_code: 200
      register: cmk_ready
      retries: 30
      delay: 5
      until: cmk_ready.status == 200

    - name: Display Checkmk access info
      ansible.builtin.debug:
        msg: |
          Checkmk VM '{{ vm_name }}' deployed on {{ mc_hostname }}.
          VM IP:  {{ vm_ip }}
          VM MAC: {{ vm_checkmk_mac.stdout }}

          URL:      https://checkmk.{{ domain }}/cmk/
          User:     cmkadmin
          Password: <see vault>

          Add DHCP reservation with MAC: {{ vm_checkmk_mac.stdout }}

# #############################################################################
# Phase 3 — Automation VM (n8n + ansible-webhook) — 172.16.86.23
# All services native (NO Docker) — n8n via Node.js, webhook via Python/pip
# #############################################################################
- name: "MC Services — Automation VM (n8n + ansible-webhook)"
  hosts: microcloud[0]
  become: true
  tags: [mc_automation]
  vars:
    vm_name: vm-automation
    vm_ip: 172.16.86.23
    vm_target: mc-node-03
  tasks:
    - name: Check if VM exists
      ansible.builtin.command: "lxc info {{ vm_name }}"
      register: vm_exists
      failed_when: false
      changed_when: false

    - name: Create automation VM on {{ vm_target }}
      when: vm_exists.rc != 0
      block:
        - name: Launch VM directly on target node
          ansible.builtin.command: >-
            lxc launch ubuntu:24.04 {{ vm_name }}
            --vm
            --target {{ vm_target }}
            --profile default
            --profile bridged-lan
            -c limits.cpu=2
            -c limits.memory=4GB
          changed_when: true

        - name: Wait for VM agent to be ready
          ansible.builtin.command: "lxc exec {{ vm_name }} -- true"
          retries: 30
          delay: 10
          register: vm_agent
          until: vm_agent.rc == 0
          changed_when: false

        - name: Remove cloud-init default netplan (disables DHCP)
          ansible.builtin.command: "lxc exec {{ vm_name }} -- rm -f /etc/netplan/50-cloud-init.yaml"
          changed_when: true

        - name: Configure static IP via netplan
          ansible.builtin.shell: |
            set -o pipefail
            cat <<'NETPLAN' | lxc exec {{ vm_name }} -- tee /etc/netplan/50-static.yaml
            network:
              version: 2
              ethernets:
                enp5s0:
                  dhcp4: false
                  addresses:
                    - {{ vm_ip }}/24
                  routes:
                    - to: default
                      via: {{ gateway }}
                  nameservers:
                    addresses:
                      - {{ dns_primary_ip }}
                      - {{ dns_secondary_ip }}
            NETPLAN
          args:
            executable: /bin/bash
          changed_when: true

        - name: Apply netplan
          ansible.builtin.command: "lxc exec {{ vm_name }} -- netplan apply"
          changed_when: true

    - name: Wait for cloud-init to finish
      ansible.builtin.command: "lxc exec {{ vm_name }} -- cloud-init status --wait"
      changed_when: false
      timeout: 300

    # --- n8n (native Node.js, no Docker) ---
    - name: Install Node.js 20 LTS
      ansible.builtin.command: >-
        lxc exec {{ vm_name }} --
        bash -c "
          if ! command -v node &>/dev/null; then
            curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
            DEBIAN_FRONTEND=noninteractive apt-get install -y nodejs
          fi
        "
      changed_when: true

    - name: Install n8n globally
      ansible.builtin.command: >-
        lxc exec {{ vm_name }} -- npm install -g n8n
      changed_when: true

    - name: Create n8n system user and data directory
      ansible.builtin.command: >-
        lxc exec {{ vm_name }} --
        bash -c "
          id n8n &>/dev/null || useradd -r -m -d /var/lib/n8n -s /usr/sbin/nologin n8n
          mkdir -p /var/lib/n8n
          chown n8n:n8n /var/lib/n8n
        "
      changed_when: true

    - name: Deploy n8n environment file
      ansible.builtin.shell: |
        set -o pipefail
        cat <<'N8N_ENV' | lxc exec {{ vm_name }} -- tee /etc/default/n8n
        N8N_HOST=0.0.0.0
        N8N_PORT=5678
        N8N_PROTOCOL=https
        WEBHOOK_URL=https://n8n.{{ domain }}/
        GENERIC_TIMEZONE=Europe/Zurich
        N8N_ENCRYPTION_KEY={{ n8n_encryption_key }}
        N8N_USER_FOLDER=/var/lib/n8n
        N8N_ENV=
        N8N_ENV
      args:
        executable: /bin/bash
      changed_when: true
      no_log: true

    - name: Deploy n8n systemd service
      ansible.builtin.shell: |
        set -o pipefail
        cat <<'N8N_SVC' | lxc exec {{ vm_name }} -- tee /etc/systemd/system/n8n.service
        [Unit]
        Description=n8n workflow automation
        After=network.target

        [Service]
        Type=simple
        User=n8n
        EnvironmentFile=/etc/default/n8n
        ExecStart=/usr/bin/n8n start
        Restart=on-failure
        RestartSec=5

        [Install]
        WantedBy=multi-user.target
        N8N_SVC
      args:
        executable: /bin/bash
      changed_when: true

    - name: Enable and start n8n
      ansible.builtin.command: >-
        lxc exec {{ vm_name }} -- bash -c "systemctl daemon-reload && systemctl enable --now n8n"
      changed_when: true

    # --- ansible-webhook (native Python, no Docker) ---
    - name: Install Python dependencies for ansible-webhook
      ansible.builtin.command: >-
        lxc exec {{ vm_name }} --
        bash -c "apt-get update && DEBIAN_FRONTEND=noninteractive apt-get install -y
        python3 git ansible curl && curl -LsSf https://astral.sh/uv/install.sh | sh"
      changed_when: true

    - name: Clone homelab-dns repo inside VM
      ansible.builtin.command: >-
        lxc exec {{ vm_name }} --
        bash -c "
          if [ ! -d /opt/homelab-dns ]; then
            git clone https://github.com/fjacquet/homelab-dns.git /opt/homelab-dns
          else
            cd /opt/homelab-dns && git pull
          fi
        "
      changed_when: true

    - name: Create venv and install ansible-webhook dependencies via uv
      ansible.builtin.command: >-
        lxc exec {{ vm_name }} --
        bash -c "~/.local/bin/uv venv /opt/webhook-venv && ~/.local/bin/uv pip install --python /opt/webhook-venv/bin/python fastapi uvicorn pydantic"
      changed_when: true

    - name: Deploy ansible-webhook environment file
      ansible.builtin.shell: |
        set -o pipefail
        cat <<'WH_ENV' | lxc exec {{ vm_name }} -- tee /etc/default/ansible-webhook
        WEBHOOK_API_KEY={{ ansible_webhook_api_key }}
        PLAYBOOKS_DIR=/opt/homelab-dns
        LOG_TAIL=200
        WH_ENV
      args:
        executable: /bin/bash
      changed_when: true
      no_log: true

    - name: Deploy ansible-webhook systemd service
      ansible.builtin.shell: |
        set -o pipefail
        cat <<'WH_SVC' | lxc exec {{ vm_name }} -- tee /etc/systemd/system/ansible-webhook.service
        [Unit]
        Description=Ansible Webhook Engine
        After=network.target

        [Service]
        Type=simple
        User=root
        EnvironmentFile=/etc/default/ansible-webhook
        WorkingDirectory=/opt/homelab-dns/ansible-webhook
        ExecStart=/opt/webhook-venv/bin/uvicorn main:app --host 0.0.0.0 --port 8000
        Restart=on-failure
        RestartSec=5

        [Install]
        WantedBy=multi-user.target
        WH_SVC
      args:
        executable: /bin/bash
      changed_when: true

    - name: Create secrets directory
      ansible.builtin.command: "lxc exec {{ vm_name }} -- mkdir -p /opt/secrets"
      changed_when: true

    - name: Enable and start ansible-webhook
      ansible.builtin.command: >-
        lxc exec {{ vm_name }} -- bash -c "systemctl daemon-reload && systemctl enable --now ansible-webhook"
      changed_when: true

    - name: Wait for n8n to be ready
      ansible.builtin.uri:
        url: "http://{{ vm_ip }}:5678/healthz"
        status_code: 200
      register: n8n_ready
      retries: 12
      delay: 10
      until: n8n_ready.status == 200

    - name: Capture VM MAC address for DHCP reservation
      ansible.builtin.command: "lxc config get {{ vm_name }} volatile.eth0.hwaddr"
      register: vm_automation_mac
      changed_when: false

    - name: Display automation access info
      ansible.builtin.debug:
        msg: |
          Automation VM '{{ vm_name }}' deployed on {{ mc_hostname }}.
          VM IP:  {{ vm_ip }}
          VM MAC: {{ vm_automation_mac.stdout }}

          n8n:             https://n8n.{{ domain }}
          ansible-webhook: https://ansible.{{ domain }}
          Swagger UI:      https://ansible.{{ domain }}/docs

          Secrets must be placed inside the VM:
            lxc exec {{ vm_name }} -- mkdir -p /opt/secrets
            lxc file push ~/.ssh/id_rsa {{ vm_name }}/opt/secrets/id_rsa
            lxc file push vault_pass {{ vm_name }}/opt/secrets/vault_pass

          Add DHCP reservation with MAC: {{ vm_automation_mac.stdout }}

# #############################################################################
# Phase 3.5 — opt4 macvlan-host bridge (macvlan isolation workaround)
# #############################################################################
# opt4 hosts vm-checkmk via macvlan. macvlan isolates the host from its VMs at layer 2:
# neither opt4→vm-checkmk nor vm-checkmk→opt4 works over the network.
# A host-side macvlan bridge interface (macvlan-host) participates in the same virtual
# switch as the VMs, enabling bidirectional communication without touching netplan.
- name: "MC Services — opt4 macvlan-host bridge"
  hosts: opt4
  become: true
  tags: [mc_macvlan_host]
  tasks:
    - name: Deploy macvlan-host systemd service
      ansible.builtin.copy:
        dest: /etc/systemd/system/macvlan-host.service
        mode: "0644"
        content: |
          [Unit]
          Description=macvlan-host bridge interface (opt4 macvlan isolation workaround)
          After=network.target
          [Service]
          Type=oneshot
          RemainAfterExit=yes
          ExecStart=/bin/bash -c 'ip link show macvlan-host &>/dev/null || ip link add macvlan-host link {{ lan_interface }} type macvlan mode bridge'
          ExecStart=/sbin/ip addr replace {{ opt4_macvlan_ip }}/24 dev macvlan-host
          ExecStart=/sbin/ip link set macvlan-host up
          ExecStart=/sbin/ip route replace {{ vm_monitoring_ip }}/32 dev macvlan-host src {{ opt4_macvlan_ip }}
          ExecStart=/sbin/ip route replace {{ vm_checkmk_ip }}/32 dev macvlan-host src {{ opt4_macvlan_ip }}
          ExecStart=/sbin/ip route replace {{ vm_automation_ip }}/32 dev macvlan-host src {{ opt4_macvlan_ip }}
          ExecStop=/sbin/ip route del {{ vm_monitoring_ip }}/32 dev macvlan-host || true
          ExecStop=/sbin/ip route del {{ vm_checkmk_ip }}/32 dev macvlan-host || true
          ExecStop=/sbin/ip route del {{ vm_automation_ip }}/32 dev macvlan-host || true
          ExecStop=/sbin/ip link delete macvlan-host
          [Install]
          WantedBy=multi-user.target
      notify: Restart macvlan-host

    - name: Enable macvlan-host service
      ansible.builtin.systemd:
        name: macvlan-host
        enabled: true
        daemon_reload: true

  handlers:
    - name: Restart macvlan-host
      ansible.builtin.systemd:
        name: macvlan-host
        state: restarted
        daemon_reload: true

# #############################################################################
# Phase 4 — Checkmk agents on all nodes
# #############################################################################
- name: "MC Services — Checkmk agents on all nodes"
  hosts: dns_servers:microcloud
  become: true
  tags: [mc_checkmk_agent]
  tasks:
    - name: Download Checkmk agent from server
      ansible.builtin.get_url:
        url: "https://checkmk.{{ domain }}/cmk/check_mk/agents/check-mk-agent_2.3.0p30-1_all.deb"
        dest: /tmp/check-mk-agent.deb
        mode: "0644"
      register: agent_download
      ignore_errors: true

    - name: Install Checkmk agent (if downloaded via HTTPS)
      ansible.builtin.apt:
        deb: /tmp/check-mk-agent.deb
      when: agent_download is not failed

    # mc-node-02 cannot reach vm-checkmk over the network (macvlan host-to-VM limitation).
    # Use lxc file pull to copy the .deb directly from the VM via the LXD API instead.
    - name: Fallback — pull agent from vm-checkmk via LXD (macvlan workaround for mc-node-02)
      when: agent_download is failed
      block:
        - name: Pull agent .deb from vm-checkmk via LXD API
          ansible.builtin.command: >-
            lxc file pull
            vm-checkmk/omd/sites/cmk/share/check_mk/agents/check-mk-agent_2.3.0p30-1_all.deb
            /tmp/check-mk-agent.deb
          changed_when: true
          failed_when: false

        - name: Install pulled agent .deb
          ansible.builtin.apt:
            deb: /tmp/check-mk-agent.deb

    - name: Clean up agent .deb
      ansible.builtin.file:
        path: /tmp/check-mk-agent.deb
        state: absent

# #############################################################################
# Phase 5 — Register hosts in Checkmk via REST API
# #############################################################################
- name: "MC Services — Register hosts in Checkmk"
  hosts: microcloud[0]
  gather_facts: false
  become: true
  tags: [mc_checkmk_hosts]
  tasks:
    - name: Register each host in Checkmk
      ansible.builtin.uri:
        url: "{{ checkmk_api_url }}/domain-types/host_config/collections/all"
        method: POST
        url_username: "{{ checkmk_automation_user }}"
        url_password: "{{ checkmk_automation_secret }}"
        force_basic_auth: true
        headers:
          Content-Type: "application/json"
        body_format: json
        body:
          host_name: "{{ item.name }}"
          folder: "/"
          attributes:
            ipaddress: "{{ item.ip }}"
        status_code: [200, 201, 400]
      failed_when: false
      loop: "{{ checkmk_hosts }}"
      loop_control:
        label: "{{ item.name }} ({{ item.ip }})"
      no_log: true

    # Checkmk 2.3 requires the real ETag (not "*") for PUT — do GET first to retrieve it.
    # Use update_attributes (merge) not attributes (replace) to avoid clearing other attrs.
    - name: Get current host config to retrieve ETag
      ansible.builtin.uri:
        url: "{{ checkmk_api_url }}/objects/host_config/{{ item.name }}"
        method: GET
        url_username: "{{ checkmk_automation_user }}"
        url_password: "{{ checkmk_automation_secret }}"
        force_basic_auth: true
        status_code: [200, 404]
      failed_when: false
      no_log: true
      loop: "{{ checkmk_hosts }}"
      loop_control:
        label: "{{ item.name }}"
      register: host_get_results

    - name: Update ipaddress for each existing host (merge-update, real ETag)
      ansible.builtin.uri:
        url: "{{ checkmk_api_url }}/objects/host_config/{{ item.item.name }}"
        method: PUT
        url_username: "{{ checkmk_automation_user }}"
        url_password: "{{ checkmk_automation_secret }}"
        force_basic_auth: true
        headers:
          Content-Type: "application/json"
          If-Match: "{{ item.etag | default('') }}"
        body_format: json
        body:
          update_attributes:
            ipaddress: "{{ item.item.ip }}"
        status_code: [200, 204]
      failed_when: false
      no_log: true
      loop: "{{ host_get_results.results }}"
      loop_control:
        label: "{{ item.item.name }} ({{ item.item.ip }})"
      when: item.status is defined and item.status == 200

    - name: Discover services on each host
      ansible.builtin.uri:
        url: "{{ checkmk_api_url }}/domain-types/service_discovery_run/collections/all"
        method: POST
        url_username: "{{ checkmk_automation_user }}"
        url_password: "{{ checkmk_automation_secret }}"
        force_basic_auth: true
        headers:
          Content-Type: "application/json"
        body_format: json
        body:
          host_name: "{{ item.name }}"
          mode: "refresh"
        status_code: [200, 201, 302]
      failed_when: false
      loop: "{{ checkmk_hosts }}"
      loop_control:
        label: "{{ item.name }}"
      no_log: true

    - name: Activate Checkmk configuration changes
      ansible.builtin.uri:
        url: "{{ checkmk_api_url }}/domain-types/activation_run/actions/activate-changes/invoke"
        method: POST
        url_username: "{{ checkmk_automation_user }}"
        url_password: "{{ checkmk_automation_secret }}"
        force_basic_auth: true
        headers:
          Content-Type: "application/json"
        body_format: json
        body:
          force_foreign_changes: true
        status_code: [200, 201, 302, 409]
      failed_when: false
      no_log: true

# #############################################################################
# Phase 6 — Checkmk tuning: accept host labels, memory rules, agent TLS
# #############################################################################
- name: "MC Services — Checkmk tuning"
  hosts: microcloud[0]
  gather_facts: false
  become: true
  tags: [mc_checkmk_tune]
  tasks:
    - name: Accept new host labels for all monitored hosts
      ansible.builtin.uri:
        url: "{{ checkmk_api_url }}/domain-types/service_discovery_run/collections/all"
        method: POST
        url_username: "{{ checkmk_automation_user }}"
        url_password: "{{ checkmk_automation_secret }}"
        force_basic_auth: true
        headers:
          Content-Type: "application/json"
        body_format: json
        body:
          host_name: "{{ item.name }}"
          mode: "only-host-labels"
        status_code: [200, 201, 302]
      failed_when: false
      loop: "{{ checkmk_hosts }}"
      loop_control:
        label: "{{ item.name }}"
      no_log: true

    - name: Create rule — raise shared memory thresholds for MicroCloud nodes
      # LXD containers use tmpfs which inflates shared memory counters on MicroCloud hosts.
      # Default thresholds (20%/30%) are too low; raise shm to 80%/95%.
      ansible.builtin.uri:
        url: "{{ checkmk_api_url }}/domain-types/rule/collections/all"
        method: POST
        url_username: "{{ checkmk_automation_user }}"
        url_password: "{{ checkmk_automation_secret }}"
        force_basic_auth: true
        headers:
          Content-Type: "application/json"
        body_format: json
        body:
          ruleset: "memory_percentage_used"
          folder: "/"
          properties:
            description: "Raise shared memory thresholds for LXD/MicroCloud nodes"
            disabled: false
          value_raw: "{'levels_shm': ('perc_used', (80.0, 95.0))}"
          conditions:
            host_name:
              match_on: "{{ checkmk_microcloud_hosts }}"
              operator: "one_of"
        status_code: [200, 201, 400]
      failed_when: false
      no_log: true

    - name: Activate Checkmk configuration changes
      ansible.builtin.uri:
        url: "{{ checkmk_api_url }}/domain-types/activation_run/actions/activate-changes/invoke"
        method: POST
        url_username: "{{ checkmk_automation_user }}"
        url_password: "{{ checkmk_automation_secret }}"
        force_basic_auth: true
        headers:
          Content-Type: "application/json"
        body_format: json
        body:
          force_foreign_changes: true
        status_code: [200, 201, 302, 409]
      failed_when: false
      no_log: true

# #############################################################################
# Phase 7 — Register Checkmk agent TLS on all monitored nodes
# #############################################################################
- name: "MC Services — Checkmk agent TLS registration"
  hosts: dns_servers:microcloud
  become: true
  tags: [mc_checkmk_tls]
  vars:
    # Derive the Checkmk hostname from the inventory:
    # - infra nodes use infra_hostname (e.g. infra1) + domain
    # - microcloud nodes use inventory_hostname (e.g. opt3) + domain
    checkmk_fqdn: >-
      {{ (infra_hostname is defined) | ternary(infra_hostname, inventory_hostname) }}.{{ domain }}
  tasks:
    - name: Check if agent is already TLS-registered
      ansible.builtin.command: cmk-agent-ctl status
      register: ctl_status
      changed_when: false
      failed_when: false

    - name: Register agent with Checkmk server (TLS)
      ansible.builtin.command: >-
        cmk-agent-ctl register
        --hostname {{ checkmk_fqdn }}
        --server 172.16.86.22
        --site cmk
        --user cmkadmin
        --password {{ vault_checkmk_password }}
        --trust-cert
      when: "'registered' not in (ctl_status.stdout | lower)"
      changed_when: true
      failed_when: false
      no_log: true

# #############################################################################
# Phase 7.2 — Checkmk agent install inside running LXD VMs
# #############################################################################
# Runs from the LXD cluster controller (microcloud[0] = opt3).
# Only installs in RUNNING VMs; stopped VMs are skipped via failed_when: false.
- name: "MC Services — Checkmk agent install in LXD VMs"
  hosts: microcloud[0]
  become: true
  tags: [mc_checkmk_agent_vms]
  tasks:
    - name: Install Checkmk agent inside running LXD VMs
      ansible.builtin.command: >-
        lxc exec {{ item }} -- bash -c
        "dpkg -l check-mk-agent 2>/dev/null | grep -q check-mk-agent ||
        (wget -q https://checkmk.{{ domain }}/cmk/check_mk/agents/check-mk-agent_2.3.0p30-1_all.deb
        -O /tmp/check-mk-agent.deb && dpkg -i /tmp/check-mk-agent.deb && rm /tmp/check-mk-agent.deb)"
      loop:
        - vm-monitoring
        - vm-checkmk
        - vm-automation
      failed_when: false
      changed_when: true

# #############################################################################
# Phase 7.5 — Checkmk agent TLS registration inside LXD VMs
# #############################################################################
# Physical host agents are registered above. VMs need registration via lxc exec
# (no network path needed — uses LXD API to exec inside the VM directly).
- name: "MC Services — Checkmk agent TLS registration in VMs"
  hosts: microcloud[0]
  become: true
  tags: [mc_checkmk_tls_vms]
  vars:
    checkmk_vm_hosts:
      - { vm: vm-monitoring, fqdn: "vm-monitoring.evlab.ch" }
      - { vm: vm-checkmk, fqdn: "vm-checkmk.evlab.ch" }
      - { vm: vm-automation, fqdn: "vm-automation.evlab.ch" }
  tasks:
    - name: Check TLS registration status inside each VM
      ansible.builtin.command: lxc exec {{ item.vm }} -- cmk-agent-ctl status
      loop: "{{ checkmk_vm_hosts }}"
      loop_control:
        label: "{{ item.vm }}"
      register: vm_ctl_status
      changed_when: false
      failed_when: false

    - name: Register Checkmk agent TLS inside each VM
      ansible.builtin.command: >-
        lxc exec {{ item.item.vm }} -- cmk-agent-ctl register
        --hostname {{ item.item.fqdn }}
        --server 172.16.86.22
        --site cmk
        --user cmkadmin
        --password {{ vault_checkmk_password }}
        --trust-cert
      loop: "{{ vm_ctl_status.results }}"
      loop_control:
        label: "{{ item.item.vm }}"
      when: "'registered' not in (item.stdout | lower)"
      changed_when: true
      failed_when: false
      no_log: true

    # vm-checkmk registers with its OWN Checkmk site (loopback connection).
    # The daemon can get a stale/corrupt cert state — force clean re-registration.
    - name: Force clean TLS re-registration for vm-checkmk (loopback self-monitoring fix)
      block:
        - name: Delete stale TLS registration in vm-checkmk
          ansible.builtin.command: lxc exec vm-checkmk -- cmk-agent-ctl delete-all
          failed_when: false
          changed_when: true

        - name: Re-register vm-checkmk agent TLS with fresh cert
          ansible.builtin.command: >-
            lxc exec vm-checkmk -- cmk-agent-ctl register
            --hostname vm-checkmk.evlab.ch
            --server 172.16.86.22
            --site cmk
            --user cmkadmin
            --password {{ vault_checkmk_password }}
            --trust-cert
          failed_when: false
          changed_when: true
          no_log: true

    - name: Restart cmk-agent-ctl daemon inside all VMs (reload cert state)
      ansible.builtin.command: >-
        lxc exec {{ item.vm }} -- systemctl restart cmk-agent-ctl-daemon.service
      loop: "{{ checkmk_vm_hosts }}"
      loop_control:
        label: "{{ item.vm }}"
      failed_when: false
      changed_when: true

# #############################################################################
# Phase 8 — Checkmk ↔ Grafana integration (automation user + datasource)
# #############################################################################
- name: "MC Services — Checkmk Grafana integration"
  hosts: microcloud[0]
  become: true
  tags: [mc_grafana_checkmk]
  vars:
    vm_monitoring: vm-monitoring
  tasks:
    - name: Create Grafana automation user in Checkmk
      ansible.builtin.uri:
        url: "{{ checkmk_api_url }}/domain-types/user_config/collections/all"
        method: POST
        url_username: "{{ checkmk_automation_user }}"
        url_password: "{{ checkmk_automation_secret }}"
        force_basic_auth: true
        headers:
          Content-Type: "application/json"
        body_format: json
        body:
          username: "grafana"
          fullname: "Grafana Integration"
          auth_option:
            auth_type: "automation"
            secret: "{{ vault_checkmk_grafana_secret }}"
          roles:
            - "guest"
        status_code: [200, 201, 400] # 400 = user already exists
      failed_when: false
      no_log: true

    - name: Activate Checkmk configuration changes
      ansible.builtin.uri:
        url: "{{ checkmk_api_url }}/domain-types/activation_run/actions/activate-changes/invoke"
        method: POST
        url_username: "{{ checkmk_automation_user }}"
        url_password: "{{ checkmk_automation_secret }}"
        force_basic_auth: true
        headers:
          Content-Type: "application/json"
        body_format: json
        body:
          force_foreign_changes: true
        status_code: [200, 201, 302, 409]
      failed_when: false
      no_log: true

    - name: Restart Grafana to load Checkmk plugin and datasource
      ansible.builtin.command: "lxc exec {{ vm_monitoring }} -- systemctl restart grafana-server"
      changed_when: true
