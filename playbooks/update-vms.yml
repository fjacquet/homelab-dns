---
# #############################################################################
# Update OS in LXD VMs (apt full-upgrade inside each VM)
#
# The 5 physical hosts are patched by `update.yml`, but the 3 LXD VMs hosting
# Prometheus/Grafana, Checkmk and n8n have their own Ubuntu installs which
# need separate patching. The VMs are not in the SSH-managed inventory; they
# are driven from one MicroCloud node via `lxc exec`.
#
# VMs:
#   vm-monitoring  172.16.86.21  Prometheus (9090) + Grafana (3000)
#   vm-checkmk     172.16.86.22  Checkmk CRE (apache on :80, OMD site `cmk`)
#   vm-automation  172.16.86.23  n8n + ansible-webhook
#
# Behaviour:
#   - apt update + full-upgrade + autoremove + autoclean inside each VM
#   - if /var/run/reboot-required exists, `lxc restart` the VM
#     (we restart at the LXD layer rather than running `reboot` inside the VM
#     — cleaner shutdown, lets LXD manage the lifecycle)
#   - wait for the VM to be reachable via `lxc exec` again
#   - re-start Checkmk's OMD site (does NOT auto-start after VM restart)
#   - verify each VM's main HTTP service responds
#
# Run:
#   ansible-playbook playbooks/update-vms.yml
#   ansible-playbook playbooks/update-vms.yml --check --diff   # dry-run
#   ansible-playbook playbooks/update-vms.yml --skip-tags reboot
# #############################################################################

- name: "Update OS in LXD VMs"
  hosts: microcloud[0]
  become: true
  tags: [update, vms]

  vars:
    vms:
      - vm-monitoring
      - vm-checkmk
      - vm-automation

  tasks:
    # Single-line bash -lc on purpose: a YAML `>-` folded scalar does NOT
    # join more-indented continuation lines (it preserves them as literal
    # newlines), which leaks `\n` + leading whitespace into the bash script
    # and bash then tries to execute `-o Dpkg::Options...` as a command.
    # The whole pipeline must stay on one logical line to avoid that trap.
    - name: Apt update + full-upgrade in each VM
      ansible.builtin.command:
        argv:
          - lxc
          - exec
          - "{{ item }}"
          - --
          - bash
          - -lc
          - >-
            set -e;
            apt-get update -qq;
            DEBIAN_FRONTEND=noninteractive apt-get -y -o Dpkg::Options::=--force-confdef -o Dpkg::Options::=--force-confold full-upgrade;
            apt-get -y autoremove;
            apt-get -y autoclean
      loop: "{{ vms }}"
      changed_when: true

    - name: Check /var/run/reboot-required per VM
      ansible.builtin.command: "lxc exec {{ item }} -- test -f /var/run/reboot-required"
      loop: "{{ vms }}"
      register: reboot_check
      changed_when: false
      failed_when: false

    - name: Restart VM if kernel was updated
      ansible.builtin.command: "lxc restart {{ item.item }}"
      loop: "{{ reboot_check.results }}"
      loop_control:
        label: "{{ item.item }}"
      when: item.rc == 0
      changed_when: true
      tags: [update, vms, reboot]

    - name: Wait for VM to be reachable via lxc exec post-restart
      ansible.builtin.command: "lxc exec {{ item.item }} -- true"
      loop: "{{ reboot_check.results }}"
      loop_control:
        label: "{{ item.item }}"
      when: item.rc == 0
      register: lxc_ready
      retries: 30
      delay: 10
      until: lxc_ready.rc == 0
      changed_when: false

    # Checkmk site does not auto-start after a VM restart — run unconditionally
    # so the playbook is safe to re-run even when no reboot happened (omd start
    # is idempotent: returns OK if already running).
    - name: Ensure Checkmk OMD site `cmk` is started
      ansible.builtin.command: "lxc exec vm-checkmk -- omd start cmk"
      changed_when: false
      failed_when: false

    - name: Verify Prometheus is responding
      ansible.builtin.uri:
        url: "http://{{ vm_monitoring_ip }}:9090/-/ready"
        status_code: 200
      register: prom_check
      until: prom_check.status == 200
      retries: 12
      delay: 10

    - name: Verify Grafana is responding
      ansible.builtin.uri:
        url: "http://{{ vm_monitoring_ip }}:3000/api/health"
        status_code: 200
      register: grafana_check
      until: grafana_check.status == 200
      retries: 12
      delay: 10

    - name: Verify Checkmk login page is responding
      ansible.builtin.uri:
        url: "http://{{ vm_checkmk_ip }}/cmk/check_mk/login.py"
        status_code: 200
      register: cmk_check
      until: cmk_check.status == 200
      retries: 12
      delay: 10
