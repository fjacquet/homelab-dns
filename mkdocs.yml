site_name: homelab-dns
site_description: Ansible-automated homelab DNS/HTTPS/VPN infrastructure
site_author: Frederic Jacquet
site_url: https://fjacquet.github.io/homelab-dns
repo_url: https://github.com/fjacquet/homelab-dns
repo_name: fjacquet/homelab-dns
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.indexes
    - navigation.top
    - content.code.copy
    - toc.follow

nav:
  - Home: index.md
  - PRD: PRD.md
  - User Guide: USER-GUIDE.md
  - Architecture Decisions:
    - Overview: adr/index.md
    - ADR-001 Dedicated Optiplex: adr/adr-001-dedicated-optiplex.md
    - ADR-002 Technitium Docker: adr/adr-002-technitium-docker.md
    - ADR-003 WireGuard Native: adr/adr-003-wireguard-native.md
    - ADR-004 Traefik keepalived: adr/adr-004-traefik-keepalived.md
    - ADR-005 NFS Synology: adr/adr-005-nfs-synology.md
    - ADR-006 Split-scope DHCP: adr/adr-006-split-scope-dhcp.md
    - ADR-007 DNS-01 Infomaniak: adr/adr-007-dns01-infomaniak.md
    - ADR-008 Dual Monitoring: adr/adr-008-dual-monitoring.md
    - ADR-009 Apps on Synology: adr/adr-009-apps-on-synology.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true
