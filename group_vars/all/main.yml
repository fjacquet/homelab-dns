# === Traefik + HA (keepalived) ===
traefik_image: traefik:latest
traefik_vip: 172.16.86.20
keepalived_auth_pass: "{{ vault_keepalived_pass }}"
infomaniak_api_token: "{{ vault_infomaniak_token }}"
traefik_acme_email: fred@ljf.ch

traefik_services:
  - { name: homeassistant, host: "homeassistant.evlab.ch", url: "http://172.16.86.10:8123" }
  - { name: n8n, host: "n8n.evlab.ch", url: "http://172.16.86.13:5678" }
  - { name: stash, host: "stash.evlab.ch", url: "http://172.16.86.10:9999" }
  - { name: pgadmin, host: "pgadmin.evlab.ch", url: "http://172.16.86.10:8888" }
  - { name: dns, host: "dns.evlab.ch", url: "http://localhost:5380" }
  - { name: dns2, host: "dns2.evlab.ch", url: "http://172.16.86.12:5380" }
  - { name: nas, host: "nas.evlab.ch", url: "http://172.16.86.10:5000" }
  # MicroCloud services (mc-node-01)
  - { name: grafana, host: "grafana.evlab.ch", url: "http://172.16.86.13:3000" }
  - { name: prometheus, host: "prometheus.evlab.ch", url: "http://172.16.86.13:9090" }
  - { name: checkmk, host: "checkmk.evlab.ch", url: "http://172.16.86.13:8090" }
  # Ansible webhook engine (mc-node-01)
  - { name: ansible, host: "ansible.evlab.ch", url: "http://172.16.86.13:8000" }

# === n8n + Ansible Webhook (automation stack on mc-node-01) ===
n8n_port: 5678
n8n_dir: /opt/n8n
automation_dir: /opt/automation
homelab_dns_repo_dir: /opt/homelab-dns
secrets_dir: /opt/secrets
ansible_webhook_port: 8000
ansible_webhook_url: "https://ansible.evlab.ch"
n8n_encryption_key: "{{ vault_n8n_encryption_key }}"
ansible_webhook_api_key: "{{ vault_ansible_webhook_key }}"

# === WireGuard (natif, pas Docker) ===
wireguard_server_url: vpn.evlab.ch
wireguard_port: 51820
wireguard_internal_subnet: "10.13.13.0/24"
# Physical LAN NIC (same on all Optiplex Micro units)
lan_interface: enp0s31f6

# Cles generees par: wg genkey | tee private.key | wg pubkey > public.key
wireguard_server_private_key: "{{ vault_wg_server_private_key }}"
wireguard_server_public_key: "{{ vault_wg_server_public_key }}"

wireguard_peers_list:
  - { name: iphone, ip: "10.13.13.2", public_key: "{{ vault_wg_iphone_pubkey }}", private_key: "{{ vault_wg_iphone_privkey }}" }
  - { name: macbook, ip: "10.13.13.3", public_key: "{{ vault_wg_macbook_pubkey }}", private_key: "{{ vault_wg_macbook_privkey }}" }
  - { name: ipad, ip: "10.13.13.4", public_key: "{{ vault_wg_ipad_pubkey }}", private_key: "{{ vault_wg_ipad_privkey }}" }

# === DDNS Infomaniak ===
infomaniak_domain_id: "{{ vault_infomaniak_domain_id }}"
infomaniak_vpn_record_id: "{{ vault_infomaniak_vpn_record_id }}"

# === NFS (Synology shared storage for MicroCloud) ===
nfs_server: "{{ nas_ip }}"
nfs_mounts:
  - { export: /volume1/datastore, mountpoint: /srv/datastore }
  - { export: /volume1/isofiles, mountpoint: /srv/isofiles }

# === Monitoring (exporters) ===
node_exporter_port: 9100
cadvisor_port: 9101
wireguard_exporter_port: 9586

# === Docker ===
docker_base_dir: /opt/docker

# === Monitoring directories ===
prometheus_dir: /opt/monitoring/prometheus
grafana_dir: /opt/monitoring/grafana
checkmk_dir: /opt/monitoring/checkmk
