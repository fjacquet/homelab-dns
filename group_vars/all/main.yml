---
# === Réseau ===
domain: evlab.ch
subnet: 172.16.86.0/24
gateway: 172.16.86.1
dns_primary_ip: "{{ hostvars[groups['dns_primary'][0]]['ansible_host'] }}"
dns_secondary_ip: "{{ hostvars[groups['dns_secondary'][0]]['ansible_host'] }}"
nas_ip: 172.16.86.10

# === Technitium ===
technitium_image: technitium/dns-server:latest
technitium_admin_password: "{{ vault_technitium_password }}"
technitium_web_port: 5380

technitium_forwarders:
  - "https://cloudflare-dns.com/dns-query"
  - "https://dns.google/dns-query"

technitium_blocklists:
  - "https://raw.githubusercontent.com/StevenBlack/hosts/master/hosts"
  - "https://big.oisd.nl/domainswild"
  - "https://raw.githubusercontent.com/hagezi/dns-blocklists/main/hosts/pro.txt"

# === DNS Records ===
dns_a_records:
  - { name: "*.evlab.ch", ip: "172.16.86.20" } # wildcard → VIP keepalived (Traefik HA)
  - { name: "opt1.evlab.ch", ip: "172.16.86.11" }
  - { name: "opt2.evlab.ch", ip: "172.16.86.12" }
  - { name: "opt3.evlab.ch", ip: "172.16.86.13" }
  - { name: "opt4.evlab.ch", ip: "172.16.86.14" }
  - { name: "opt5.evlab.ch", ip: "172.16.86.15" }
  - { name: "infra1.evlab.ch", ip: "172.16.86.11" }
  - { name: "infra2.evlab.ch", ip: "172.16.86.12" }
  - { name: "pikvm.evlab.ch", ip: "172.16.86.3" }
  - { name: "switch.evlab.ch", ip: "172.16.86.2" }
  - { name: "hue.evlab.ch", ip: "172.16.86.6" }
  - { name: "weather.evlab.ch", ip: "172.16.86.8" }
  - { name: "nas.evlab.ch", ip: "172.16.86.10" }
  - { name: "mc-node-01.evlab.ch", ip: "172.16.86.13" }
  - { name: "mc-node-02.evlab.ch", ip: "172.16.86.14" }
  - { name: "mc-node-03.evlab.ch", ip: "172.16.86.15" }
  - { name: "tvbox.evlab.ch", ip: "172.16.86.25" }
  - { name: "roborock.evlab.ch", ip: "172.16.86.42" }

dns_ptr_records:
  - { ip: "172.16.86.1", name: "gateway.evlab.ch" }
  - { ip: "172.16.86.3", name: "pikvm.evlab.ch" }
  - { ip: "172.16.86.2", name: "switch.evlab.ch" }
  - { ip: "172.16.86.6", name: "hue.evlab.ch" }
  - { ip: "172.16.86.8", name: "weather.evlab.ch" }
  - { ip: "172.16.86.10", name: "nas.evlab.ch" }
  - { ip: "172.16.86.11", name: "infra1.evlab.ch" }
  - { ip: "172.16.86.12", name: "infra2.evlab.ch" }
  - { ip: "172.16.86.13", name: "mc-node-01.evlab.ch" }
  - { ip: "172.16.86.14", name: "mc-node-02.evlab.ch" }
  - { ip: "172.16.86.15", name: "mc-node-03.evlab.ch" }
  - { ip: "172.16.86.25", name: "tvbox.evlab.ch" }
  - { ip: "172.16.86.42", name: "roborock.evlab.ch" }

