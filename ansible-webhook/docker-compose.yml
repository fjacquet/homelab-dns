---
services:
  ansible-webhook:
    build: .
    container_name: ansible-webhook
    restart: unless-stopped
    environment:
      - WEBHOOK_API_KEY=${WEBHOOK_API_KEY}
      # Optional overrides
      - PLAYBOOKS_DIR=/playbooks
      - LOG_TAIL=200
    volumes:
      # Repo root (playbooks, inventory, group_vars, templates)
      - /volume1/homelab-dns:/playbooks:ro
      # SSH private key for Ansible SSH connections
      - /volume1/secrets/id_rsa:/root/.ssh/id_rsa:ro
      # Ansible Vault password file
      - /volume1/secrets/vault_pass:/vault_pass:ro
    networks:
      - n8n_default
    ports:
      - "8000:8000"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ansible.rule=Host(`ansible.evlab.ch`)"
      - "traefik.http.routers.ansible.tls=true"
      - "traefik.http.services.ansible.loadbalancer.server.port=8000"
      - "com.centurylinklabs.watchtower.enable=false"

networks:
  n8n_default:
    external: true
