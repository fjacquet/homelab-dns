---
# Standalone docker-compose for local dev/testing.
# Production deployment is managed via microcloud-services.yml (Phase 3)
# which deploys this service alongside n8n on mc-node-01.
#
# Volume layout on mc-node-01:
#   /srv/datastore/homelab-dns  ← NFS from Synology (repo clone, playbooks)
#   /opt/secrets/id_rsa         ← SSH key (local, not on NFS)
#   /opt/secrets/vault_pass     ← Vault password (local, not on NFS)

services:
  ansible-webhook:
    build: .
    container_name: ansible-webhook
    restart: unless-stopped
    environment:
      - WEBHOOK_API_KEY=${WEBHOOK_API_KEY}
      - PLAYBOOKS_DIR=/playbooks
      - LOG_TAIL=200
    volumes:
      - /srv/datastore/homelab-dns:/playbooks:ro
      - /opt/secrets/id_rsa:/root/.ssh/id_rsa:ro
      - /opt/secrets/vault_pass:/vault_pass:ro
    ports:
      - "8000:8000"
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
